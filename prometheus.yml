global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'laravel-backend'
    scrape_timeout: 12s
    metrics_path: '/prometheus' # Le bon chemin
    static_configs:
      - targets: ['laravel_app:8000'] # Utilisation du VRAI nom du conteneur

  - job_name: 'cadvisor'
    scrape_interval: 10s
    static_configs:
      - targets: ['cadvisor:8080']