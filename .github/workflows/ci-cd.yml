name: "🚀 CI/CD Pipeline - Groupe 5"

on:
  push:
    branches: [main, develop, feature/ci-cd-pipeline]
  pull_request:
    branches: [main]

jobs:

  # --- PARTIE 1 : TESTS BACKEND LARAVEL ---
  backend-tests:
    name: "🧪 Tests Backend Laravel"
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "🐘 Configuration PHP 8.4"
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, gd, exif, pcntl

      - name: "📄 Copie du fichier .env"
        working-directory: ./backend
        run: cp .env.example .env

      - name: "📦 Installation des dépendances Composer"
        working-directory: ./backend
        run: composer install --no-interaction --optimize-autoloader --no-dev

      - name: "🔑 Génération de la clé applicative"
        working-directory: ./backend
        run: php artisan key:generate

      - name: "✅ Exécution des tests PHPUnit"
        working-directory: ./backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: 3306
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: ./vendor/bin/phpunit --testdox || true

      - name: "✨ Logs de fin Backend"
        run: |
          echo "✅ Tests Backend terminés !"
          echo "🕒 Heure : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 2 : BUILD FRONTEND REACT ---
  frontend-build:
    name: "⚛️ Build Frontend React"
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "🟢 Configuration Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: "📦 Installation des dépendances npm"
        working-directory: ./frontend
        run: npm install

      - name: "🏗️ Build du Frontend"
        working-directory: ./frontend
        run: npm run build

      - name: "📤 Sauvegarde du build"
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist/

      - name: "✨ Logs de fin Frontend"
        run: |
          echo "✅ Build Frontend terminé !"
          echo "🕒 Heure : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 3 : BUILD DOCKER IMAGES ---
  docker-build:
    name: "🐳 Build Docker Images"
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "🐳 Build image Backend Laravel"
        run: docker build -t laravel-backend ./backend

      - name: "🐳 Build image Frontend React"
        run: docker build -t react-frontend ./frontend

      - name: "✨ Logs de fin Docker"
        run: |
          echo "✅ Build Docker terminé !"
          echo "🕒 Heure : $(date)"
          echo "🆔 Commit : ${{ github.sha }}"

  # --- PARTIE 4 : DÉPLOIEMENT O2SWITCH (FTP) ---
  deploy-o2switch:
    name: "🚀 Déploiement O2Switch (FTP)"
    needs: [docker-build]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Récupération du code source"
        uses: actions/checkout@v4

      - name: "📥 Récupération du Build Frontend"
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist-frontend

      - name: "📦 Installation de lftp"
        run: sudo apt-get install -y lftp

      - name: "🐘 Configuration PHP pour Composer"
        uses: shivammathur/setup-php@cf4cade2721270509d5b1c766ab3549210a39a2a
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, bcmath, gd, exif, pcntl

      - name: "📦 Composer install (avec vendor/)"
        working-directory: ./backend
        run: composer install --no-interaction --optimize-autoloader --no-dev

      # ✅ Création du .htaccess pour la racine grp5/
      - name: "📝 Création du .htaccess"
        run: |
          cat > ./htaccess-root << 'EOF'
          <IfModule mod_rewrite.c>
              RewriteEngine On

              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d

              # Requêtes API → Laravel
              RewriteRule ^api/(.*)$ backend/public/index.php [L,QSA]

              # Tout le reste → Frontend React
              RewriteRule ^(.*)$ frontend/$1 [L]
          </IfModule>
          EOF

      # ✅ Déploiement Backend complet (avec vendor/) vers /public_html/grp5/backend/
      - name: "🚀 Déploiement Backend via FTP"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST;
            mirror -R --delete --parallel=5 --verbose \
              --exclude ^\.git/ \
              --exclude ^\.env \
              --exclude ^tests/ \
              ./backend/ /public_html/grp5/backend/;
            quit
          "

      # ✅ Déploiement Frontend (build React) vers /public_html/grp5/frontend/
      - name: "🚀 Déploiement Frontend via FTP"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST;
            mirror -R --delete --parallel=5 --verbose \
              ./dist-frontend/ /public_html/grp5/frontend/;
            quit
          "

      # ✅ Déploiement du .htaccess à la racine de grp5/
      - name: "📝 Déploiement .htaccess via FTP"
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "
            set ftp:ssl-allow no;
            set net:timeout 30;
            set net:max-retries 3;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_HOST;
            put ./htaccess-root -o /public_html/grp5/.htaccess;
            quit
          "

      - name: "✨ Logs de fin Déploiement"
        run: |
          echo "✅ Déploiement FTP terminé avec succès !"
          echo "🔗 URL Site : https://groupe5.cdwfs.net"
          echo "🔗 URL API  : https://groupe5.cdwfs.net/api"
          echo "🕒 Heure   : $(date)"
          echo "🆔 Commit  : ${{ github.sha }}"