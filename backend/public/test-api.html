<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Abonnés</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px; }
        button:hover { background: #45a049; }
        #result { background: #f4f4f4; padding: 15px; border-radius: 4px; margin-top: 20px; white-space: pre-wrap; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Test API Abonnés</h1>
    
    <h2>GET - Récupérer tous les abonnés</h2>
    <button onclick="getAbonnes()">GET /api/abonne</button>
    
    <h2>POST - Créer un abonné</h2>
    <div class="form-group">
        <label>Nom:</label>
        <input type="text" id="nom" value="Dupont">
    </div>
    <div class="form-group">
        <label>Prénom:</label>
        <input type="text" id="prenom" value="Jean">
    </div>
    <div class="form-group">
        <label>Ville:</label>
        <select id="ville">
            <option value="Yaounde">Yaounde</option>
            <option value="Douala" selected>Douala</option>
            <option value="Bafoussam">Bafoussam</option>
            <option value="Garoua">Garoua</option>
        </select>
    </div>
    <div class="form-group">
        <label>Quartier:</label>
        <input type="text" id="quartier" value="Akwa">
    </div>
    <div class="form-group">
        <label>Numéro Compteur:</label>
        <input type="text" id="numeroCompteur" value="AA0011">
    </div>
    <div class="form-group">
        <label>Type Abonnement:</label>
        <select id="typeAbonnement">
            <option value="Domestique" selected>Domestique</option>
            <option value="Professionnel">Professionnel</option>
        </select>
    </div>
    <button onclick="createAbonne()">POST /api/abonne</button>
    
    <h2>Résultat:</h2>
    <div id="result">Les résultats s'afficheront ici...</div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api/abonne';

        async function getAbonnes() {
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Erreur: ' + error.message;
            }
        }

        async function createAbonne() {
            const data = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                ville: document.getElementById('ville').value,
                quartier: document.getElementById('quartier').value,
                numeroCompteur: document.getElementById('numeroCompteur').value,
                typeAbonnement: document.getElementById('typeAbonnement').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                document.getElementById('result').textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Erreur: ' + error.message;
            }
        }
    </script>
</body>
</html>
