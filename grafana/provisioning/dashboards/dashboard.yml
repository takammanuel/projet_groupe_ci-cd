# Provisioning automatique : chargement des dashboards JSON
apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Docker Monitoring'
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
