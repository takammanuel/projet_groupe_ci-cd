version: '3.8'

services:
  # Service Backend (Laravel)
  backend:
    build: ./backend
    container_name: laravel_app
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db

  # Service Frontend (React)
  frontend:
    build: ./frontend
    container_name: react_app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:5173"

  # Base de données (Port externe 3307)
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: evaluation_sn
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_eval
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_eval
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # Collecteur de métriques système (Port externe 9101)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter_eval
    ports:
      - "9101:9100"